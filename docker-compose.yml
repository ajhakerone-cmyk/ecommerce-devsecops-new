version: "3.8"

services:
  app:
    build: .
    container_name: ecommerce-app
    ports:
      - "5000:5000"

    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - FLASK_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
